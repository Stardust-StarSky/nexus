<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- 抽象连接图形 -->
  <g transform="translate(0, 26)">
    <!-- 主弧线 -->
    <path d="M 25 70 Q 70 10, 100 70 Q 130 130, 175 70" stroke="url(#grad1)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 30 85 Q 70 25, 95 85 Q 120 145, 160 85" stroke="url(#grad1)" stroke-width="3.5" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- 连接点 -->
    <circle cx="25" cy="70" r="9" fill="#3b82f6" stroke="white" stroke-width="2.5"/>
    <circle cx="25" cy="70" r="3.5" fill="white" opacity="0.5"/>

    <circle cx="100" cy="70" r="11" fill="#8b5cf6" stroke="white" stroke-width="2.5"/>
    <circle cx="100" cy="70" r="4.5" fill="white" opacity="0.5"/>

    <circle cx="175" cy="70" r="9" fill="#06b6d4" stroke="white" stroke-width="2.5"/>
    <circle cx="175" cy="70" r="3.5" fill="white" opacity="0.5"/>

    <!-- 小装饰点 -->
    <circle cx="45" cy="38" r="4" fill="#3b82f6" opacity="0.5"/>
    <circle cx="78" cy="35" r="4" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="128" cy="35" r="4" fill="#06b6d4" opacity="0.5"/>
    <circle cx="55" cy="100" r="4" fill="#3b82f6" opacity="0.5"/>
    <circle cx="145" cy="100" r="4" fill="#8b5cf6" opacity="0.5"/>
  </g>
</svg>