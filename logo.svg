<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 抽象连接图形 -->
  <g transform="translate(25, 40)">
    <!-- 主弧线 -->
    <path d="M 30 60 Q 60 15, 90 60 Q 120 105, 150 60" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 35 70 Q 60 30, 85 70 Q 110 110, 135 70" stroke="url(#grad1)" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- 连接点 -->
    <circle cx="30" cy="60" r="5" fill="#3b82f6" stroke="white" stroke-width="2"/>
    <circle cx="90" cy="60" r="5" fill="#8b5cf6" stroke="white" stroke-width="2"/>
    <circle cx="150" cy="60" r="5" fill="#06b6d4" stroke="white" stroke-width="2"/>

    <!-- 小装饰点 -->
    <circle cx="45" cy="38" r="2.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="75" cy="38" r="2.5" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="105" cy="38" r="2.5" fill="#06b6d4" opacity="0.5"/>
    <circle cx="60" cy="82" r="2.5" fill="#3b82f6" opacity="0.5"/>
    <circle cx="120" cy="82" r="2.5" fill="#8b5cf6" opacity="0.5"/>
  </g>
</svg>