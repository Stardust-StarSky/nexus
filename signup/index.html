<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Nexus · 注册</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: system-ui, sans-serif; }
        body { background: #0f0f12; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .container { background:#1c1c22; border-radius:32px; padding:40px 36px; max-width:420px; width:100%; box-shadow:0 25px 60px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.06); }
        .logo { text-align:center; margin-bottom:32px; }
        .logo h1 { color:#f1f5f9; font-size:28px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:12px; }
        .logo h1 small { font-size:16px; font-weight:400; color:#94a3b8; }
        .logo img { width:60px; height:60px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; color:#94a3b8; font-size:14px; font-weight:500; margin-bottom:6px; }
        .form-group input { width:100%; padding:14px 16px; border-radius:16px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:#f1f5f9; font-size:16px; outline:none; transition:0.2s; }
        .form-group input:focus { border-color:#3b82f6; background:rgba(255,255,255,0.1); box-shadow:0 0 0 3px rgba(59,130,246,0.15); }
        .form-group .hint { font-size:12px; color:#64748b; margin-top:4px; }
        .btn { width:100%; padding:14px; border:none; border-radius:16px; font-size:16px; font-weight:600; cursor:pointer; transition:0.2s; }
        .btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; box-shadow:0 4px 16px rgba(59,130,246,0.3); }
        .btn-primary:hover { box-shadow:0 6px 24px rgba(59,130,246,0.4); transform:translateY(-1px); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .btn-secondary { background:rgba(255,255,255,0.08); color:#cbd5e1; border:1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background:rgba(255,255,255,0.14); }
        .error-msg { color:#fca5a5; background:#450a0a; padding:10px 16px; border-radius:12px; font-size:14px; display:none; margin-bottom:12px; }
        .success-msg { color:#86efac; background:#064e3b; padding:10px 16px; border-radius:12px; font-size:14px; display:none; margin-bottom:12px; }
        .footer { text-align:center; margin-top:20px; color:#475569; font-size:13px; }
        .footer a { color:#64748b; text-decoration:none; }
        .footer a:hover { color:#94a3b8; text-decoration:underline; }
        .password-strength { display:flex; gap:4px; margin-top:6px; }
        .password-strength .bar { flex:1; height:4px; border-radius:4px; background:#2a2a32; transition:0.3s; }
        .password-strength .bar.active.weak { background:#ef4444; }
        .password-strength .bar.active.medium { background:#f59e0b; }
        .password-strength .bar.active.strong { background:#22c55e; }
        @media (prefers-color-scheme: light) {
            body { background:#f0f2f5; }
            .container { background:white; border-color:#e9edf2; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
            .logo h1 { color:#1e293b; }
            .logo h1 small { color:#64748b; }
            .form-group label { color:#334155; }
            .form-group input { background:#f8fafc; border-color:#d1d9e6; color:#1e293b; }
            .form-group input:focus { border-color:#3b82f6; background:white; }
            .form-group .hint { color:#94a3b8; }
            .btn-secondary { background:#e9edf2; color:#1e293b; border-color:#d1d9e6; }
            .btn-secondary:hover { background:#d1d9e6; }
            .footer { color:#94a3b8; }
            .footer a { color:#64748b; }
            .error-msg { background:#fee2e2; color:#b91c1c; }
            .success-msg { background:#dcfce7; color:#166534; }
            .password-strength .bar { background:#e9edf2; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img src="../logo.svg" alt="Nexus" />
        <h1>Nexus <small>· 注册</small></h1>
    </div>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <form id="signupForm">
        <div class="form-group">
            <label>账号</label>
            <input type="text" id="usernameInput" placeholder="请输入账号（至少2位）" autocomplete="off" />
            <div class="hint">账号将作为登录名，不可更改</div>
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="passwordInput" placeholder="请输入密码（至少6位）" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" />
            <div class="hint">需包含大写字母、小写字母和数字</div>
            <div class="password-strength" id="strengthBars">
                <div class="bar" data-index="0"></div>
                <div class="bar" data-index="1"></div>
                <div class="bar" data-index="2"></div>
            </div>
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" id="confirmInput" placeholder="再次输入密码" autocomplete="off" readonly onfocus="this.removeAttribute('readonly')" />
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">提交申请</button>
    </form>
    <div class="footer">
        已有账号？<a href="/">返回登录</a>
    </div>
</div>

<script>
    const WORKER_URL = window.location.origin;
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const confirmInput = document.getElementById('confirmInput');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
    }
    function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
    }

    function checkPasswordStrength(password) {
        let score = 0;
        if (password.length >= 6) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        return score;
    }

    function updateStrengthBars(password) {
        const score = checkPasswordStrength(password);
        const bars = document.querySelectorAll('.bar');
        bars.forEach(bar => { bar.className = 'bar'; });
        const level = Math.min(score, 3);
        for (let i = 0; i < level; i++) {
            bars[i].classList.add('active');
            if (score >= 4) bars[i].classList.add('strong');
            else if (score >= 2) bars[i].classList.add('medium');
            else bars[i].classList.add('weak');
        }
    }

    passwordInput.addEventListener('input', function() {
        updateStrengthBars(this.value);
    });

    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (!username || username.length < 2) {
            showError('账号至少2位');
            return;
        }
        if (!password || password.length < 6) {
            showError('密码至少6位');
            return;
        }
        if (password !== confirm) {
            showError('两次密码输入不一致');
            return;
        }
        if (!/[a-z]/.test(password) || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
            showError('密码需包含大写字母、小写字母和数字');
            return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = '提交中...';

        // 找到这一段并替换：
    try {
        const resp = await fetch(WORKER_URL + '/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        
        // 🔥 修复核心：先检查响应状态，并确保有内容可读
        if (!resp.ok) {
            let errText = '提交失败';
            try {
                const errResult = await resp.json();
                errText = errResult.error || errText;
            } catch(_) {
                errText = await resp.text() || errText; // 如果不是JSON，读纯文本
            }
            showError('❌ ' + errText);
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
            return;
        }

        const result = await resp.json();
        if (result.success) {
            showSuccess('✅ 注册申请已提交！请等待管理员审核。');
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
            usernameInput.value = '';
            passwordInput.value = '';
            confirmInput.value = '';
            document.querySelectorAll('.bar').forEach(bar => { bar.className = 'bar'; });
        } else {
            showError('❌ ' + (result.error || '提交失败'));
            registerBtn.disabled = false;
            registerBtn.textContent = '提交申请';
        }
    } catch (err) {
        showError('网络错误: ' + err.message);
        registerBtn.disabled = false;
        registerBtn.textContent = '提交申请';
    }
    });
</script>
</body>
</html>
